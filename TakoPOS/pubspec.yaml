name: takopos
description: "TakoPOS - Fast, Offline-First Point of Sale System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database (Offline-First)
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Backend Sync
  supabase_flutter: ^2.8.0
  connectivity_plus: ^6.1.4

  # Routing
  go_router: ^14.6.0

  # UI
  google_fonts: ^6.2.1

  # Barcode Scanner
  mobile_scanner: ^5.2.3

  # Receipt Printing (will add printer support later to avoid dependency conflicts)

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  equatable: ^2.0.5
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13
  drift_dev: ^2.20.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

